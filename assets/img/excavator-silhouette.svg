<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="currentColor">
  <!-- 3/4 Perspective Mini Excavator Vector Graphic -->
  <g>
    <!-- Tracks Base (Oruga inferior) -->
    <rect x="120" y="380" width="260" height="50" rx="25" fill="none" stroke="currentColor" stroke-width="24" stroke-linecap="round" />
    <ellipse cx="150" cy="405" rx="16" ry="16" fill="#ffffff" />
    <ellipse cx="350" cy="405" rx="16" ry="16" fill="#ffffff" />
    <circle cx="210" cy="405" r="10" fill="#ffffff" />
    <circle cx="250" cy="405" r="10" fill="#ffffff" />
    <circle cx="290" cy="405" r="10" fill="#ffffff" />

    <!-- Upper Revolving Body / Cab (Chasis superior) -->
    <path d="M 120 375 L 110 260 C 110 220, 150 200, 200 200 L 260 200 C 280 200, 295 215, 295 235 L 295 375 Z" />

    <!-- Seat & Canopy Roof (Butaca y Techo) -->
    <path d="M 170 200 L 165 60 L 290 60 L 295 72 L 182 72 L 188 200 Z" />
    <!-- Operator Seat -->
    <path d="M 135 240 C 135 210, 165 210, 175 240 L 195 270 L 140 270 Z" fill="#ffffff" />

    <!-- Hydraulic Boom Arm (Brazo hidráulico principal) -->
    <path d="M 280 300 C 300 220, 360 120, 440 100 L 465 125 C 390 155, 330 240, 310 320 Z" />
    <!-- Dipper / Stick Arm (Brazo secundario) -->
    <path d="M 440 100 L 510 180 L 490 230 L 465 125 Z" />

    <!-- Excavator Bucket (Balde / Cuchara) -->
    <path d="M 490 230 C 510 230, 545 255, 520 290 C 490 315, 455 285, 465 250 Z" />
    <path d="M 520 290 L 535 305 M 510 298 L 525 313 M 498 302 L 510 318" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />

    <!-- Hydraulic Cylinders (Pistones hidráulicos) -->
    <path d="M 270 250 L 375 165" stroke="#ffffff" stroke-width="7" stroke-linecap="round" />
    <path d="M 370 170 L 470 150" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
  </g>
</svg>
