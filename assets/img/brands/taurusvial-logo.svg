<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="100%" height="100%">
  <!-- Exact Taurus Official Logo Vector from User Image 3 -->
  <g>
    <!-- Black Oval Speed Badge -->
    <ellipse cx="60" cy="60" rx="52" ry="48" fill="#111827" />

    <!-- Speed Lines on Oval Left Edge -->
    <path d="M 12 35 C 18 35, 22 45, 22 60 C 22 75, 18 85, 12 85 Z" fill="#ffffff" opacity="0.2" />
    <path d="M 18 42 C 22 42, 25 50, 25 60 C 25 70, 22 78, 18 78 Z" fill="#ffffff" opacity="0.2" />

    <!-- Bull Head (Yellow with Long Horns) -->
    <path d="M 30 30 C 18 42, 25 70, 42 88 L 60 98 L 78 98 L 96 88 C 113 70, 120 42, 108 30 C 98 40, 90 54, 84 72 L 54 72 C 48 54, 40 40, 30 30 Z" fill="#ffe100" />
    <!-- Curved Horn Tips -->
    <path d="M 26 34 C 18 20, 32 12, 46 22 C 38 26, 32 30, 26 34 Z" fill="#ffe100" />
    <path d="M 112 34 C 120 20, 106 12, 92 22 C 100 26, 106 30, 112 34 Z" fill="#ffe100" />

    <!-- TAURUS Text inside Bull Forehead -->
    <text x="69" y="42" text-anchor="middle" font-family="'Montserrat', sans-serif" font-weight="900" font-style="italic" font-size="11" fill="#ffffff" letter-spacing="1">TAURUS</text>

    <!-- Main TAURUS Typography (White/Dark Italic) -->
    <text x="130" y="68" font-family="'Montserrat', system-ui, sans-serif" font-weight="900" font-style="italic" font-size="44" fill="#111827" letter-spacing="1">TAURUS</text>
    <text x="250" y="94" font-family="'Montserrat', system-ui, sans-serif" font-weight="600" font-style="italic" font-size="16" fill="#4b5563" letter-spacing="1">División Vial</text>
  </g>
</svg>
