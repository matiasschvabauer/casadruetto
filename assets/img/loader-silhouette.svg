<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="currentColor">
  <!-- 3/4 Perspective Wheel Loader (Pala Cargadora) Vector Graphic -->
  <g>
    <!-- Big Rear Wheel -->
    <ellipse cx="160" cy="350" rx="75" ry="90" />
    <ellipse cx="160" cy="350" rx="42" ry="50" fill="#ffffff" />
    <ellipse cx="160" cy="350" rx="25" ry="30" />

    <!-- Big Front Wheel -->
    <ellipse cx="380" cy="350" rx="75" ry="90" />
    <ellipse cx="380" cy="350" rx="42" ry="50" fill="#ffffff" />
    <ellipse cx="380" cy="350" rx="25" ry="30" />

    <!-- Rear Counterweight Body -->
    <path d="M 60 330 L 60 250 C 60 230, 90 220, 150 220 L 230 220 L 230 350 L 100 350 Z" />
    <rect x="75" y="240" width="30" height="15" rx="3" fill="#ffffff" />

    <!-- Cabin Cab -->
    <path d="M 180 220 L 195 90 L 320 100 L 335 220 Z" />
    <!-- Cabin Roof Light Bar -->
    <rect x="200" y="82" width="115" height="12" rx="4" fill="#ffffff" />
    <!-- Cabin Windows (Cutouts) -->
    <path d="M 210 105 L 305 112 L 315 205 L 200 205 Z" fill="#ffffff" />
    <path d="M 230 130 L 290 135 L 295 190 L 225 190 Z" />

    <!-- Front Chassis & Engine Frame -->
    <path d="M 230 220 L 410 220 L 420 330 L 230 330 Z" />

    <!-- Front Loader Arm (Brazo de la pala) -->
    <path d="M 320 230 L 480 200 L 530 290 L 460 270 L 320 260 Z" />

    <!-- Front Bucket Loader (Cucharon / Pala) -->
    <path d="M 480 200 L 580 210 L 570 330 L 470 310 Z" />
    <path d="M 580 210 L 590 325 L 570 330 Z" stroke="#ffffff" stroke-width="3" />

    <!-- Hydraulic Cylinders -->
    <path d="M 340 200 L 470 170" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    <path d="M 465 170 L 515 220" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
